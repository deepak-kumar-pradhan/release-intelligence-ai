name: Build Push Deploy Container App

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: releaseintelligence-fqhthdcvh9duhkbt.azurecr.io
  IMAGE_REPOSITORY: release-intelligence-ri
  CONTAINER_APP_NAME: release-intelligence-ri
  RESOURCE_GROUP: rg-ri-hackathon

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_SHA_TAG="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${GITHUB_SHA}"
          IMAGE_LATEST_TAG="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:latest"

          docker buildx build \
            --platform linux/amd64 \
            -t "${IMAGE_SHA_TAG}" \
            -t "${IMAGE_LATEST_TAG}" \
            --push \
            .

          echo "IMAGE_SHA_TAG=${IMAGE_SHA_TAG}" >> "$GITHUB_ENV"

      - name: Deploy new image to Azure Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_SHA_TAG"

      - name: Show app URL
        run: |
          az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv
